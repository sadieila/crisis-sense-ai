services:
  - type: web
    name: crisis-sense-ai
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        sync: false
      - key: ANTHROPIC_ANALYSIS_MODEL_PRIMARY
        sync: false
      - key: INTERNAL_DASHBOARD_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SMOKE_USER_ID
        sync: false
      - key: ACTIVE_THRESHOLD
        value: "5"
      - key: INCIDENT_WINDOW_HOURS
        value: "24"
